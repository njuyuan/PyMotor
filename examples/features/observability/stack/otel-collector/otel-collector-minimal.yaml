# OpenTelemetry Collector configuration for minimal mode.
# Receives OTLP traces/logs from pyMotor and routes:
#   traces → Tempo
#   logs   → Loki
#
# start.sh ensure_loki_image() 会在 Hub 拉取失败时本地 build Loki 镜像。

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s
  resource:
    attributes:
      - key: deployment.environment
        value: pymotor-observability-minimal
        action: upsert
  attributes/loki:
    actions:
      - key: loki.format
        value: json
        action: insert

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/tempo, debug]
    logs:
      receivers: [otlp]
      processors: [batch, resource, attributes/loki]
      exporters: [loki, debug]
  telemetry:
    logs:
      level: info
