              - name: hccn-conf
                mountPath: /etc/hccn.conf
              - name: weight-mount
                mountPath: /mnt/weight
              - name: plog-path
                mountPath: /root/ascend/log
            volumes:
            - name: data
              hostPath:
                path: /data
            - name: motor-config
              configMap:
                name: motor-config
                defaultMode: 360
            - name: queue-schedule
              hostPath:
