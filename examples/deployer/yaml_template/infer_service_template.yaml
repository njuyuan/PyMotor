          ports:
          - nodePort: 31015
            port: 1025
            protocol: TCP
            targetPort: 1025
          selector:
            app: mindie-motor-coordinator
          sessionAffinity: None
          type: NodePort
      - name: mindie-motor-coordinator-mgmt
