                  memory: "4Gi"
                  cpu: "16"
                limits:
                  memory: "8Gi"
                  cpu: "64"
              volumeMounts:
              - name: motor-config
                mountPath: /mnt/configmap
              - name: coredump
                mountPath: /var/coredump
              - name: mnt
                mountPath: /mnt
            volumes:
            - name: motor-config
