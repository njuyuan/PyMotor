                name: motor-config
                defaultMode: 360
            - name: coredump
              hostPath:
                path: /var/coredump
                type: DirectoryOrCreate
            - name: mnt
              hostPath:
                path: /mnt

    - name: encode
      replicas: 4
      workload:
        apiVersion: apps/v1
        kind: StatefulSet
      metadata:
        labels:
          infer.huawei.com/gang-schedule: 'true'
      spec:
        replicas: 2
        podManagementPolicy: Parallel
        selector:
          matchLabels:
            app: mindie-server
        template:
          metadata:
            labels:
              fault-scheduling: grace
              fault-retry-times: "10000"
              app: mindie-server
              ring-controller.atlas: ascend-910b
          spec:
            schedulerName: volcano
            nodeSelector:
