                failureThreshold: 100
              readinessProbe:
                exec:
                  command: ["bash", "-c", "$CONFIGMAP_PATH/probe.sh readiness"]
                periodSeconds: 10
                timeoutSeconds: 30
                failureThreshold: 5
              livenessProbe:
