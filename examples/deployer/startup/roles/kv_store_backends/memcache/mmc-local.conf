## Meta service start-up url
## Keep consistent with the same name configuration in mmc-meta.conf
ock.mmc.meta_service_url = tcp://mindie-motor-kvs-master:50088

## Config store url
## Keep consistent with the same name configuration in mmc-meta.conf
ock.mmc.local_service.config_store_url = tcp://mindie-motor-kvs-master:50089

## Log level: debug, info, warn, error
ock.mmc.log_level = info

## The maximum supported rank count; once ranks are connected, no further
## modifications are allowed — a meta restart is required.
ock.mmc.local_service.world_size = 256

## Data transfer protocol — set at runtime by daemon.py based on hardware type:
##   A2 (800I_A2 / 800T_A2)  →  device_rdma
##   A3 / A5                  →  device_sdma
ock.mmc.local_service.protocol = device_sdma

## LocalService DRAM pool size — set at runtime by daemon.py:
##   inprocess  mode: per-process pool memory (currently hardcoded 10GB;
##                     future: memfabric_hybrid.mem_scan.stat() / dp_count)
##   standalone mode: 0GB (vLLM gets 0; standalone LS uses Python API)
ock.mmc.local_service.dram.size = 0GB

## Maximum DRAM pool size
ock.mmc.local_service.max.dram.size = 1024GB
